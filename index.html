  <title>Ăn Gì Đây?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --bg: #1a0508;
      --surface: #2a0d12;
      --surface2: #3a1218;
      --border: #5a2030;
      --red: #e8193c;
      --red-dark: #b01028;
      --pink: #ff6b8a;
      --pink-soft: #ffb3c1;
      --rose: #ff3d6b;
      --yellow: #fbbf24;
      --text: #fff0f3;
      --muted: #c08090;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #1a0508;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .food-anim {
      font-size: 80px;
      animation: float 1.2s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 18px #ff6b8a88);
    }
    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-14px); }
    }
    .smoke {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      height: 30px;
      align-items: flex-end;
    }
    .smoke span {
      width: 6px;
      border-radius: 10px;
      background: linear-gradient(to top, #ff6b8a88, transparent);
      animation: rise 1.4s ease-in-out infinite;
    }
    .smoke span:nth-child(1) { height: 20px; animation-delay: 0s; }
    .smoke span:nth-child(2) { height: 28px; animation-delay: 0.2s; }
    .smoke span:nth-child(3) { height: 16px; animation-delay: 0.4s; }
    @keyframes rise {
      0%, 100% { opacity: 0.3; transform: translateY(0) scaleX(1); }
      50% { opacity: 1; transform: translateY(-8px) scaleX(1.3); }
    }
    #loading-screen p {
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    /* App */
    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--rose), var(--pink-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }
    .header p { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Random section */
    .random-card {
      background: linear-gradient(135deg, #3d0d18, #2a0d12);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .random-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(232,25,60,0.15), transparent 70%);
      pointer-events: none;
    }
    .result-display {
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .result-icon { font-size: 44px; margin-bottom: 6px; }
    .result-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .result-name.empty {
      font-size: 15px;
      color: var(--muted);
      font-weight: 400;
      font-style: italic;
    }
    .result-type { font-size: 13px; color: var(--pink); margin-top: 4px; }
    .result-stars { font-size: 13px; color: var(--yellow); margin-top: 2px; }

    .btn-shake {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--red), var(--rose));
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 20px rgba(232,25,60,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-shake:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(232,25,60,0.3);
    }
    .btn-shake.shaking {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-8px) rotate(-2deg); }
      30% { transform: translateX(8px) rotate(2deg); }
      45% { transform: translateX(-6px) rotate(-1deg); }
      60% { transform: translateX(6px) rotate(1deg); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .btn-add {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--pink);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: 1.5px solid var(--red);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:active { background: rgba(232,25,60,0.08); }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 20px 0 12px;
    }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tab.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* Restaurant list */
    .rest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .rest-emoji { font-size: 32px; flex-shrink: 0; }
    .rest-info { flex: 1; min-width: 0; }
    .rest-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rest-meta {
      font-size: 12px;
      color: var(--pink);
      margin-top: 2px;
    }
    .rest-stars { font-size: 11px; color: var(--yellow); margin-top: 2px; }
    .rest-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px;
      border-radius: 9px;
      font-size: 16px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: rgba(255,255,255,0.08); }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state .big { font-size: 40px; margin-bottom: 10px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--red); }

    /* Type selector */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .type-btn {
      padding: 12px 8px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .type-btn.selected {
      background: rgba(232,25,60,0.15);
      border-color: var(--red);
      color: var(--text);
    }

    .star-row { display: flex; gap: 6px; margin-top: 4px; }
    .star-btn {
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.25;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .star-btn.active { opacity: 1; }
    .star-btn:active { transform: scale(1.25); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 12px;
      background: transparent;
      color: var(--muted);
      font-family: inherit; font-size: 14px; font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 12px;
      background: linear-gradient(135deg, var(--red), var(--rose));
      color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
    }
    .btn-save:active { opacity: 0.85; }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="food-anim">🍲</div>
  <div class="smoke">
    <span></span><span></span><span></span>
  </div>
  <p>đang nấu ăn...</p>
</div>

<div class="app">
  <div class="header">
    <h1>ĂN GÌ ĐÂY? 🍽️</h1>
    <p>hết cảnh đau đầu không biết ăn gì</p>
  </div>

  <!-- Random card -->
  <div class="random-card">
    <div class="result-display">
      <div class="result-icon" id="result-icon">🎲</div>
      <div class="result-name empty" id="result-name">Bấm lắc để chọn quán!</div>
      <div class="result-type" id="result-type"></div>
      <div class="result-stars" id="result-stars"></div>
    </div>
    <button class="btn-shake" id="btn-shake" onclick="shakeRandom()">🎰 Lắc xem ăn gì nào!</button>
  </div>

  <div class="divider"></div>

  <button class="btn-add" onclick="openAddModal()">＋ Thêm quán mới</button>

  <div class="section-title">KHO QUÁN CỦA BẠN</div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all')">Tất cả</button>
    <button class="filter-tab" onclick="setFilter('lau')">🫕 Lẩu</button>
    <button class="filter-tab" onclick="setFilter('nuong')">🔥 Nướng</button>
    <button class="filter-tab" onclick="setFilter('nhau')">🍺 Nhậu</button>
    <button class="filter-tab" onclick="setFilter('nhat')">🍣 Nhật</button>
    <button class="filter-tab" onclick="setFilter('choi')">🎡 Đi chơi</button>
  </div>

  <div id="rest-list"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2 id="modal-title">Thêm Quán Mới 🍜</h2>
    <div class="field">
      <label>TÊN QUÁN</label>
      <input type="text" id="input-name" placeholder="Ví dụ: Lẩu Thái Lan 68..." />
    </div>
    <div class="field">
      <label>LOẠI MÓN</label>
      <div class="type-grid">
        <button class="type-btn selected" data-type="lau" onclick="selectType(this)">🫕 Lẩu</button>
        <button class="type-btn" data-type="nuong" onclick="selectType(this)">🔥 Nướng</button>
        <button class="type-btn" data-type="nhau" onclick="selectType(this)">🍺 Nhậu</button>
        <button class="type-btn" data-type="nhat" onclick="selectType(this)">🍣 Nhật</button>
        <button class="type-btn" data-type="choi" onclick="selectType(this)">🎡 Đi chơi</button>
      </div>
    </div>
    <div class="field">
      <label>ĐÁNH GIÁ</label>
      <div class="star-row" id="star-row">
        <button class="star-btn active" onclick="setStars(1)">⭐</button>
        <button class="star-btn active" onclick="setStars(2)">⭐</button>
        <button class="star-btn active" onclick="setStars(3)">⭐</button>
        <button class="star-btn" onclick="setStars(4)">⭐</button>
        <button class="star-btn" onclick="setStars(5)">⭐</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Hủy</button>
      <button class="btn-save" onclick="saveRest()">LƯU LẠI</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'angidday_kho';

  const TYPE_INFO = {
    lau:   { label: 'Lẩu',   icon: '🫕' },
    nuong: { label: 'Nướng', icon: '🔥' },
    nhau:  { label: 'Nhậu',  icon: '🍺' },
    nhat:  { label: 'Nhật',  icon: '🍣' },
    choi:  { label: 'Đi chơi', icon: '🎡' },
  };

  const DEFAULT_DATA = [
    { name: 'Lẩu Thái anh Tám', type: 'lau',   stars: 4 },
    { name: 'BBQ Vườn Nhà',      type: 'nuong', stars: 5 },
    { name: 'Nhậu Xôm Tụ',      type: 'nhau',  stars: 3 },
    { name: 'Sushi Nhật Bản',    type: 'nhat',  stars: 4 },
  ];

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch(e) { alert('Lỗi lưu: ' + e.message); }
  }

  let data = loadData();
  let currentFilter = 'all';
  let editMode = false;
  let editIdx = null;
  let currentStars = 3;
  let currentType = 'lau';

  function stars(n) { return '⭐'.repeat(n); }

  function filteredData() {
    if (currentFilter === 'all') return data.map((r, i) => ({...r, _idx: i}));
    return data.map((r, i) => ({...r, _idx: i})).filter(r => r.type === currentFilter);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderList() {
    const list = document.getElementById('rest-list');
    const items = filteredData();
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="big">🍽️</div>Chưa có quán nào. Thêm ngay nha!</div>';
      return;
    }
    list.innerHTML = items.map(r => `
      <div class="rest-card">
        <div class="rest-emoji">${TYPE_INFO[r.type].icon}</div>
        <div class="rest-info">
          <div class="rest-name">${escHtml(r.name)}</div>
          <div class="rest-meta">${TYPE_INFO[r.type].label}</div>
          <div class="rest-stars">${stars(r.stars)}</div>
        </div>
        <div class="rest-actions">
          <button class="icon-btn" onclick="openEditModal(${r._idx})">✏️</button>
          <button class="icon-btn" onclick="deleteRest(${r._idx})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      const label = f === 'all' ? 'Tất cả' : TYPE_INFO[f]?.label;
      btn.classList.toggle('active', label && btn.textContent.includes(label));
    });
    renderList();
  }

  function deleteRest(idx) {
    if (!confirm(`Xóa "${data[idx].name}"?`)) return;
    data.splice(idx, 1);
    saveData();
    renderList();
  }

  // Random
  let shakeInterval = null;

  function shakeRandom() {
    const pool = currentFilter === 'all' ? data : data.filter(r => r.type === currentFilter);
    if (pool.length === 0) {
      document.getElementById('result-name').textContent = '⚠️ Chưa có quán nào!';
      document.getElementById('result-name').classList.add('empty');
      document.getElementById('result-icon').textContent = '😅';
      document.getElementById('result-type').textContent = '';
      document.getElementById('result-stars').textContent = '';
      return;
    }

    const btn = document.getElementById('btn-shake');
    btn.classList.remove('shaking');
    void btn.offsetWidth;
    btn.classList.add('shaking');

    // Slot machine effect
    let count = 0;
    const total = 12;
    if (shakeInterval) clearInterval(shakeInterval);
    shakeInterval = setInterval(() => {
      const r = pool[Math.floor(Math.random() * pool.length)];
      document.getElementById('result-icon').textContent = TYPE_INFO[r.type].icon;
      document.getElementById('result-name').textContent = r.name;
      document.getElementById('result-name').classList.remove('empty');
      document.getElementById('result-type').textContent = TYPE_INFO[r.type].label;
      document.getElementById('result-stars').textContent = stars(r.stars);
      count++;
      if (count >= total) {
        clearInterval(shakeInterval);
        // Final pick
        const final = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('result-icon').textContent = TYPE_INFO[final.type].icon;
        document.getElementById('result-name').textContent = final.name;
        document.getElementById('result-type').textContent = TYPE_INFO[final.type].label;
        document.getElementById('result-stars').textContent = stars(final.stars);
      }
    }, 80);
  }

  // Modal
  function selectType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentType = btn.dataset.type;
  }

  function setStars(n) {
    currentStars = n;
    document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('active', i < n));
  }

  function openAddModal() {
    editMode = false; editIdx = null;
    document.getElementById('modal-title').textContent = 'Thêm Địa Điểm Mới 🍜';
    document.getElementById('input-name').value = '';
    document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === 'lau'));
    currentType = 'lau';
    setStars(3);
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-name').focus(), 100);
  }

  function openEditModal(idx) {
    editMode = true; editIdx = idx;
    const r = data[idx];
    document.getElementById('modal-title').textContent = 'Chỉnh Sửa Quán ✏️';
    document.getElementById('input-name').value = r.name;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === r.type));
    currentType = r.type;
    setStars(r.stars);
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-name').focus(), 100);
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  function closeModalOnBg(e) { if (e.target.id === 'modal') closeModal(); }

  function saveRest() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) { document.getElementById('input-name').focus(); return; }
    const entry = { name, type: currentType, stars: currentStars };
    if (editMode) { data[editIdx] = entry; }
    else { data.push(entry); }
    saveData();
    renderList();
    closeModal();
  }

  // Loading
  window.addEventListener('load', function() {
    setTimeout(function() {
      var ls = document.getElementById('loading-screen');
      ls.classList.add('fade-out');
      setTimeout(function() { ls.style.display = 'none'; }, 500);
    }, 2000);
  });

  renderList();
</script>
</body>
</html>
